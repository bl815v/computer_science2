<h2>Árbol de Huffman</h2>

<div class="huffman-container">

  <!-- Entrada de mensaje -->
  <div class="card">
    <div class="row" style="flex-direction: column; align-items: stretch;">
      <label for="message-input" style="margin-bottom: 8px;">Mensaje:</label>
      <textarea id="message-input" rows="4" placeholder="Escribe el mensaje para generar el árbol de Huffman..." style="width: 100%; padding: 8px; font-family: inherit; border: 1px solid var(--ms-border); border-radius: 2px;"></textarea>
    </div>
    <div class="row" style="justify-content: flex-end; margin-top: 12px;">
      <button id="create-tree-btn" class="primary">Crear árbol</button>
    </div>
  </div>

  <!-- Sección de resultados (oculta inicialmente) -->
  <div id="results-section" style="display: none; width: 100%;">

    <!-- Tabla de códigos Huffman -->
    <div class="card">
      <h3 style="margin-top: 0; margin-bottom: 16px;">Códigos generados</h3>
      <div id="codes-table" style="display: flex; flex-wrap: wrap; gap: 12px; justify-content: center;">
        <!-- Se llena dinámicamente -->
      </div>
    </div>

    <!-- Búsqueda de letra -->
    <div class="card">
      <div class="row">
        <label>Buscar letra:</label>
        <input type="text" id="search-letter" maxlength="1" placeholder="A-Z" style="width: 60px;" />
        <button id="search-btn" class="primary">Buscar</button>
        <span id="search-result" style="margin-left: 12px; font-style: italic;"></span>
      </div>
    </div>

    <!-- Visualización del árbol -->
    <div class="card">
      <div class="row" style="justify-content: space-between;">
        <h3 style="margin: 0;">Árbol de Huffman</h3>
        <div class="row" style="gap: 8px;">
          <label for="image-size-slider">Tamaño:</label>
          <input type="range" id="image-size-slider" min="200" max="1200" value="600" step="10" style="width: 150px;">
          <span id="image-size-value">600px</span>
        </div>
      </div>
      <div class="visual-wrapper" style="margin-top: 16px;">
        <img id="tree-image" src="" alt="Árbol de Huffman" style="max-width: 100%; border: 1px solid #ccc; background: white;" />
      </div>
    </div>

    <!-- Botón para mostrar fuentes reducidas (paso a paso) -->
    <div class="card" style="text-align: center;">
      <button id="show-steps-btn" class="ribbon-btn" style="padding: 10px 20px; font-size: 14px;">Ver fuentes de información reducidas</button>
    </div>

    <!-- Sección de pasos (oculta inicialmente) -->
    <div id="steps-section" class="card" style="display: none; margin-top: 16px;">
      <h3 style="margin-top: 0;">Pasos de construcción</h3>
      <div id="steps-content" style="font-family: monospace; white-space: pre-wrap; text-align: left; max-height: 300px; overflow-y: auto; background: #faf9f8; padding: 12px; border-radius: 4px; border: 1px solid var(--ms-border);"></div>
      <h3 style="margin-top: 16px;">Tabla de frecuencias</h3>
      <div id="freq-table" style="font-family: monospace; white-space: pre-wrap; text-align: left; background: #faf9f8; padding: 12px; border-radius: 4px; border: 1px solid var(--ms-border);"></div>
    </div>

  </div>

</div>
